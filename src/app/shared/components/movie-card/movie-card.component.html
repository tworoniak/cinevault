<article class="movie-card" [attr.aria-label]="movie().title">
  <a class="movie-card__poster-link" [routerLink]="['/movies', movie().imdbID]">
    @if (hasPoster) {
      <img class="movie-card__poster" [src]="movie().poster" [alt]="movie().title" loading="lazy" />
    } @else {
      <div class="movie-card__poster-placeholder">
        <span>No Image</span>
      </div>
    }
  </a>

  <div class="movie-card__body">
    <a class="movie-card__title" [routerLink]="['/movies', movie().imdbID]">{{ movie().title }}</a>

    <div class="movie-card__meta">
      <span class="movie-card__year">{{ movie().year }}</span>
      @if (movie().type) {
        <span class="movie-card__type">{{ movie().type }}</span>
      }
    </div>

    @if (mode() === 'search') {
      @if (inWatchlist()) {
        <button class="movie-card__btn movie-card__btn--added" aria-disabled="true" tabindex="0" aria-label="Already in watchlist">In Watchlist</button>
      } @else {
        <button class="movie-card__btn movie-card__btn--add" (click)="onAdd()">+ Watchlist</button>
      }
    }
    @if (mode() === 'watchlist') {
      <button class="movie-card__btn movie-card__btn--remove" (click)="onRemove()">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        Remove
      </button>
    }
  </div>
</article>
