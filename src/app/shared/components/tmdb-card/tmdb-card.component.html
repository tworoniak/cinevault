<article
  class="tmdb-card"
  [attr.aria-label]="movie().title"
  [routerLink]="['/discover/movie', movie().tmdbId]"
>
  <div class="tmdb-card__poster-wrap">
    @if (movie().poster !== '' && !posterError()) {
      <img
        class="tmdb-card__poster"
        [src]="movie().poster"
        [alt]="movie().title + ' poster'"
        loading="lazy"
        (error)="posterError.set(true)"
      />
    } @else {
      <div class="tmdb-card__poster-fallback" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="9" cy="9" r="2"/>
          <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
        </svg>
      </div>
    }
  </div>

  <div class="tmdb-card__body">
    <h3 class="tmdb-card__title">{{ movie().title }}</h3>
    <div class="tmdb-card__meta">
      <span class="tmdb-card__year">{{ movie().year }}</span>
      <span class="tmdb-card__rating">{{ movie().rating }} ★</span>
    </div>
  </div>
</article>
